<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soil Siege | Lara Gülpen</title>
    <link rel="stylesheet" href="navbar_files/style.css">
    <link rel="stylesheet" href="footer_files/style.css" />
    <link rel="stylesheet" href="cv_files/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR (loaded via JS if you're using that method) -->
    <div id="navbar"></div>

    <script>
        fetch("navbar_files/navbar.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("navbar").innerHTML = data;
        });
    </script>

    <!-- HERO -->
    <section class="hero">
        <div class="container hero-content">
        <div class="hero-text">
            <h1>Soil Siege</h1>
            <p>
            Soil Siege is a 3D, rotatable tower defense game where players protect the many layers of earth from human contamination. Deploying nature's defenses, players discover the hidden world beneath their feet - the soil, its inhabitants and its threats.
            </p>
            <ul class="platform-link">
                <a href="https://drive.google.com/drive/folders/1xkHZ6myTyn6eflpfbxmAMw9YVhm2QwzM?usp=sharing"><img src="images/Play-Store--Streamline-Core.png" alt=""></a>
            </ul>
        </div>
        <div class="hero-image">
            <img src="soilsiege_files/SoilSiege.png" alt="Portrait">
        </div>
        </div>
    </section>

    <!-- Gallery -->
    <section id="gallery">
        <div class="section-header">
        <div class="container">
            <h2>Gallery</h2>
        </div>
        </div>
        <div class="container grid">
        <div class="card"><img src="soilsiege_files/1_Store_SplashScreen.png" alt=""></div>
        <div class="card"><img src="soilsiege_files/2_Store_MainMenu.png" alt=""></div>
        <div class="card"><img src="soilsiege_files/3_Store_Weather1.png" alt=""></div>
        <div class="card"><img src="soilsiege_files/4_Store_SelectDefenders.png" alt=""></div>
        <div class="card"><img src="soilsiege_files/5_Store_Upgrade-Drought.png" alt=""></div>
        <div class="card"><img src="soilsiege_files/6_Store_CodexDefenders.png" alt=""></div>
        </div>
    </section>

    <!-- FOOT BAR -->
    <div id="footer"></div>
    <script>
        fetch("footer_files/footer.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("footer").innerHTML = data;
        });
    </script>
</body>
</html>
