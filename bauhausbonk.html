<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <title>Bauhaus Bonk | Lara Gülpen</title>
    <link rel="stylesheet" href="navbar_files/style.css">
    <link rel="stylesheet" href="footer_files/style.css" />
    <link rel="stylesheet" href="cv_files/style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/logo.ico">
</head>
<body>

    <!-- NAVBAR (loaded via JS if you're using that method) -->
    <div id="navbar"></div>
    <script src="js/main.js"></script>

    <!-- HERO -->
    <section class="hero">
        <div class="container hero-content">
        <div class="hero-text">
            <h1>Bauhaus Bonk</h1>
            <p>
            In this single-player one-button dexterity game, movement is not straightforward. Alternate between pivots to spin through 54 Bauhaus-inspired arcade levels. Avoid obstacles, clear levels, and beat the global high score! 
            </p>
            <ul class="platform-link">
                <a href="https://store.steampowered.com/app/2948330/Bauhaus_Bonk/"><img src="images/Steam--Streamline-Simple-Icons.png" alt=""></a>
                <a href="https://apps.apple.com/de/app/bauhaus-bonk/id6476688758"><img src="images/Apple--Streamline-Core.png" alt=""></a>
                <a href="https://play.google.com/store/apps/details?id=com.spoonfulgames.bauhausbonk&hl=gsw"><img src="images/Play-Store--Streamline-Core.png" alt=""></a>
            </ul>
        </div>
        <div class="hero-image">
            <img src="bauhausbonk_files/BB.png" alt="Portrait">
        </div>
        </div>
    </section>

    <!-- Gallery -->
    <section id="gallery">
        <div class="section-header">
        <div class="container">
            <h2>Gallery</h2>
        </div>
        </div>
        <div class="container grid">
        <div class="card"><iframe src="https://www.youtube.com/embed/L-tPJaK06a0"></iframe></div>
        <div class="card"><img src="bauhausbonk_files/BB1.jpg" alt=""></div>
        <div class="card"><img src="bauhausbonk_files/BB2.jpg" alt=""></div>
        <div class="card"><img src="bauhausbonk_files/BB3.jpg" alt=""></div>
        <div class="card"><img src="bauhausbonk_files/BB4.jpg" alt=""></div>
        <div class="card"><img src="bauhausbonk_files/BB5.jpg" alt=""></div>
        </div>
    </section>
    
    <!-- Awards -->
    <section id="awards">
        <div class="section-header">
        <div class="container">
            <h2>Awards</h2>
        </div>
        </div>
        <div class="container grid">
            <div class="card">
                <a href="https://deutscher-computerspielpreis.de/chronik/bauhaus-bonk/?lang=en">
                    <img src="bauhausbonk_files/dcp25_2.png" alt="">
                </a>
            </div>
            <div class="card">
                <a href="https://deutscherentwicklerpreis.de/nominee/bauhaus-bonk/">
                    <img src="bauhausbonk_files/dep24.png" alt="">
                </a>
            </div>
        </div>
    </section>

    <!-- FOOT BAR -->
    <div id="footer"></div>
    <script>
        fetch("footer_files/footer.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("footer").innerHTML = data;
        });
    </script>
</body>
</html>
