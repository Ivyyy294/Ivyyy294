<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agnaktor | Lara Gülpen</title>
    <link rel="stylesheet" href="navbar_files/style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="footer_files/style.css" />
    <link rel="stylesheet" href="style/section_style.css">
    <link rel="icon" type="image/x-icon" href="images/logo.ico">
</head>
<body>

  <!-- NAVBAR (loaded via JS if you're using that method) -->
  <div id="navbar"></div>
  <script src="js/main.js"></script>

  <!-- HERO -->
  <section class="hero">
    <div class="container hero-content">
      <div class="hero-text">
        <h1>Agnaktor</h1>
        <p>
          Agnaktor S Armor (Blademaster) ~ Monster Hunter Tri
        </p>
        <a href="cv.html" class="btn placeholder">Learn More</a>
      </div>
      <div class="hero-image">
        <img src="agnaktor_files/Agnaktor1_crop.jpg" alt="Portrait">
      </div>
    </div>
  </section>

  <!-- Gallery -->
  <section id="gallery">
    <div class="section-header">
      <div class="container">
        <h2>Gallery</h2>
      </div>
    </div>
    <div class="container grid">
      <div class="card"><img src="agnaktor_files/Agnaktor2.jpg" alt=""></div>
      <div class="card"><img src="agnaktor_files/Agnaktor3.jpg" alt=""></div>
      <div class="card"><img src="agnaktor_files/Agnaktor4.jpg" alt=""></div>
      <div class="card"><img src="agnaktor_files/Agnaktor5.jpg" alt=""></div>
      <div class="card"><img src="agnaktor_files/Agnaktor6.jpg" alt=""></div>
      <div class="card"><img src="agnaktor_files/Agnaktor1.jpg" alt=""></div>
    </div>
  </section>
  
  <!-- Credits -->
  <section>
    <div class="section-header">
      <div class="container">
        <h2>Credits</h2>
      </div>
    </div>

    <div class="container section-box">
      <div class="section-entry">
        <p class="section-title2">
          Armor by: <strong>Lara Gülpen</strong>
        </p>
        <p class="section-title2">
          Wyvern Ignition by: <a href="https://www.instagram.com/districtcreations/"><strong>District Creations</strong></a>
        </p>
        <p class="section-title2">
          Photos by: <a href="https://www.instagram.com/districtcreations/"><strong>District Creations</strong></a>
        </p>
      </div>
    </div>
  </section>

  <!-- FOOT BAR -->
  <div id="footer"></div>
  <script>
    fetch("footer_files/footer.html")
      .then(response => response.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

</body>
</html>
